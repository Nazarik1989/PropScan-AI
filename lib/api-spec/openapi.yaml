openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: documents
    description: Property document operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List all uploaded documents
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"
  /documents/upload:
    post:
      operationId: uploadDocument
      tags: [documents]
      summary: Upload a property PDF document for analysis
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/DocumentUpload"
      responses:
        "201":
          description: Document uploaded and analysis started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /documents/stats:
    get:
      operationId: getDocumentStats
      tags: [documents]
      summary: Get aggregate stats across all documents
      responses:
        "200":
          description: Document statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentStats"
  /documents/{id}:
    get:
      operationId: getDocument
      tags: [documents]
      summary: Get a document with its full analysis
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Document with analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentWithAnalysis"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete a document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Document:
      type: object
      properties:
        id:
          type: integer
        filename:
          type: string
        filesize:
          type: integer
        status:
          type: string
          enum: [pending, processing, completed, failed]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - filename
        - filesize
        - status
        - createdAt
        - updatedAt
    DocumentWithAnalysis:
      type: object
      properties:
        id:
          type: integer
        filename:
          type: string
        filesize:
          type: integer
        status:
          type: string
          enum: [pending, processing, completed, failed]
        summary:
          type: ["string", "null"]
        riskItems:
          type: ["array", "null"]
          items:
            $ref: "#/components/schemas/RiskItem"
        overallRisk:
          type: ["string", "null"]
          enum: [low, medium, high, null]
        riskScore:
          type: ["integer", "null"]
        missingDocuments:
          type: ["array", "null"]
          items:
            type: string
        recommendations:
          type: ["array", "null"]
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - filename
        - filesize
        - status
        - summary
        - riskItems
        - overallRisk
        - riskScore
        - missingDocuments
        - recommendations
        - createdAt
        - updatedAt
    RiskItem:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        severity:
          type: string
          enum: [low, medium, high]
        category:
          type: string
      required:
        - title
        - description
        - severity
        - category
    DocumentUpload:
      type: object
      properties:
        file:
          type: string
          format: binary
      required:
        - file
    DocumentStats:
      type: object
      properties:
        total:
          type: integer
        completed:
          type: integer
        processing:
          type: integer
        highRisk:
          type: integer
        mediumRisk:
          type: integer
        lowRisk:
          type: integer
      required:
        - total
        - completed
        - processing
        - highRisk
        - mediumRisk
        - lowRisk
    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
